name: 📚 Daily Books + Covers Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'إعادة جلب كاملة + أغلفة'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  update-books:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install deps
        run: pip install -r requirements.txt

      - name: 🔄 Run update (books + covers)
        env:
          GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
          FORCE_REFRESH: ${{ github.event.inputs.force_refresh || 'false' }}
        run: python scripts/main.py

      - name: 🔍 Check changes
        id: check
        run: git diff --quiet || echo "changes=true" >> $GITHUB_OUTPUT

      - name: 📤 Commit & Push
        if: steps.check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "📚 Corruption Books Bot"
          git add data/ README.md index.html assets/
          
          BOOK_COUNT=$(python -c "import json; print(len(json.load(open('data/books.json')).get('books',[])))")
          COVERS=$(python -c "import json; d=json.load(open('data/books.json')); print(d.get('metadata',{}).get('cover_stats',{}).get('resolved',0))")
          
          git commit -m "🔄 $(date +%Y-%m-%d) | 📚 ${BOOK_COUNT} كتاب | 🖼️ ${COVERS} غلاف"
          git push

      - name: ✅ Done
        if: steps.check.outputs.changes != 'true'
        run: echo "📭 لا تحديثات جديدة"
